name: range_wave
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  get: ^4.7.3
  iconsax: ^0.0.8
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  flutter_otp_text_field: ^1.5.1+1
  flutter_svg: ^2.2.3
  flutter_spinkit: ^5.2.2
  image_picker: ^1.0.4
  load_switch: ^2.2.0
  skeletonizer: ^2.1.1
  dotted_border: ^3.1.0
  intl_phone_field: ^3.2.0
  timelines_plus: ^1.0.8
  intl: ^0.19.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  geolocator: ^10.0.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.0.0
  flutter_dotenv: ^6.0.0
  google_maps_flutter: ^2.16.0
  flutter_sound: ^9.2.13
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  table_calendar: ^3.1.2
  socket_io_client: ^3.1.1
  flutter_stripe: ^10.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner:
  flutter_gen_runner: ^5.4.1

# FlutterGen configuration
flutter_gen:
  output: lib/gen
  integrations:
    flutter_svg: true

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/